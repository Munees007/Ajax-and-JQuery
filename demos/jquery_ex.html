<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery Example</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <p id="count">0</p>
    <button id="add">Add</button>
    <script>
        let count = 0
        $("#add").click(()=>{
            count++;
            $("#count").text(count)
        })
    </script>
</body>
</html>
