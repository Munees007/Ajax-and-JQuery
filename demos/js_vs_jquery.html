<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS vs jQuery</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .box {
            width: 150px;
            height: 150px;
            background: skyblue;
            margin: 10px auto;
            text-align: center;
            line-height: 150px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-light text-center">

<div class="container mt-5">

    <h2>JavaScript vs jQuery</h2>

    <div class="row mt-4">

        <!-- JavaScript Section -->
        <div class="col-md-6">
            <h4>JavaScript</h4>
            <div id="jsBox" class="box">JS</div>

            <button id="jsBtn" class="btn btn-primary">Click Me</button>
        </div>

        <!-- jQuery Section -->
        <div class="col-md-6">
            <h4>jQuery</h4>
            <div id="jqBox" class="box">jQuery</div>

            <button id="jqBtn" class="btn btn-success">Click Me</button>
        </div>

    </div>

</div>

<script>
/* =========================
   JavaScript Version
========================= */

let jsCount = 0;

document.getElementById("jsBtn").addEventListener("click", function() {
    jsCount++;

    let box = document.getElementById("jsBox");

    box.innerHTML = jsCount;
    box.style.backgroundColor = "orange";

    box.style.display = "none";

    setTimeout(function() {
        box.style.display = "block";
    }, 500);
});


/* =========================
   jQuery Version
========================= */

let jqCount = 0;

$("#jqBtn").click(function() {
    jqCount++;

    $("#jqBox")
        .text(jqCount)
        .css("background-color", "orange")
        .hide()
        .fadeIn(500);
});

</script>

</body>
</html>
