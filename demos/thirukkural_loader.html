<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJAX Demo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light text-center">

<div class="container mt-5">
    <h2 class="mb-4">Thirukkural Loader (AJAX)</h2>
    <input type="number" id="kural_num" placeholder="Enter Kural Number">
    <button id="loadBtn" class="btn btn-primary mb-4">
        Load Kural
    </button>

    <div id="result" class="card p-4 shadow">
        Click button to load data...
    </div>
</div>

<script>
$(document).ready(function() {

    $("#loadBtn").click(function() {

    let num = parseInt($("#kural_num").val())

    $("#result").text("Loading...");

    $.ajax({
        url: `https://thirukkural-api-845e.onrender.com/api/kural_single`,
        method: "POST",
        contentType: "application/json",

        data: JSON.stringify({ num: num }),

        success: function(d) {
            const data = d.data
            $("#result").html(`
                <p>Kural Number: ${data.number}</p>
                <h2>${data.adhiharam.tamil}</h2>
                <p><strong>Iyal:</strong> ${data.iyal.tamil}</p>

                <div>
                    <p>"${data.kural.tamil[0]}"</p>
                    <p>"${data.kural.tamil[1]}"</p>
                </div>

                <p><strong>Pal:</strong> ${data.pal.tamil}</p>
                <p><strong>Meaning:</strong> ${data.meaning.tamil}</p>
            `);

        },

        error: function() {
            $("#result").text("Error loading data!");
        }

    });

});

});
</script>

</body>
</html>
