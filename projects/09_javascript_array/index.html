<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Array</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            padding: 30px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        input, button {
            padding: 10px;
            margin: 6px 4px 6px 0;
        }

        #output {
            margin-top: 15px;
            background: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>JavaScript Array Example</h1>
        <p>Enter a value and perform basic array operations.</p>

        <input type="text" id="itemInput" placeholder="Enter item">
        <button onclick="addItem()">Add Item</button>
        <button onclick="showItems()">Show Items</button>
        <button onclick="sortItems()">Sort</button>
        <button onclick="reverseItems()">Reverse</button>

        <div id="output"></div>
    </div>

    <script>
        const items = ["HTML", "CSS", "JavaScript"];

        function showItems() {
            document.getElementById("output").innerHTML =
                "<strong>Array Values:</strong> " + items.join(", ") +
                "<br><strong>Total Items:</strong> " + items.length;
        }

        function addItem() {
            const input = document.getElementById("itemInput");
            const value = input.value.trim();

            if (value === "") {
                alert("Please enter an item.");
                return;
            }

            items.push(value);
            input.value = "";
            showItems();
        }

        function sortItems() {
            items.sort();
            showItems();
        }

        function reverseItems() {
            items.reverse();
            showItems();
        }

        showItems();
    </script>
</body>
</html>
