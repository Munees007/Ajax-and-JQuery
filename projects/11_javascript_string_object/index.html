<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Object Manipulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eff6ff;
            padding: 30px;
        }

        .box {
            max-width: 760px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
        }

        #result {
            margin-top: 20px;
            background: #e2e8f0;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>String Object Manipulation</h1>
        <input type="text" id="textInput" placeholder="Enter a string" size="40">
        <button onclick="processText()">Process</button>

        <div id="result"></div>
    </div>

    <script>
        function processText() {
            const text = document.getElementById("textInput").value;

            if (text.trim() === "") {
                alert("Please enter a string.");
                return;
            }

            const result = `
                <p><strong>Original:</strong> ${text}</p>
                <p><strong>Length:</strong> ${text.length}</p>
                <p><strong>Uppercase:</strong> ${text.toUpperCase()}</p>
                <p><strong>Lowercase:</strong> ${text.toLowerCase()}</p>
                <p><strong>Substring (0 to 5):</strong> ${text.substring(0, 5)}</p>
                <p><strong>Replace a with @:</strong> ${text.replace(/a/gi, "@")}</p>
                <p><strong>Words:</strong> ${text.split(" ").join(" | ")}</p>
            `;

            document.getElementById("result").innerHTML = result;
        }
    </script>
</body>
</html>
