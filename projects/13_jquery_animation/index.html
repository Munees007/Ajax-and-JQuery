<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fefce8;
            padding: 30px;
            text-align: center;
        }

        #box {
            width: 120px;
            height: 120px;
            background: #f97316;
            position: relative;
            margin: 40px auto;
            border-radius: 14px;
        }

        button {
            padding: 10px 18px;
            border: none;
            background: #ea580c;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>jQuery Animation Example</h1>
    <button id="animateBtn">Start Animation</button>
    <div id="box"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $("#animateBtn").click(function () {
            $("#box").animate({
                left: "200px",
                width: "160px",
                height: "160px",
                opacity: 0.6
            }, 1000).animate({
                left: "0px",
                width: "120px",
                height: "120px",
                opacity: 1
            }, 1000);
        });
    </script>
</body>
</html>
