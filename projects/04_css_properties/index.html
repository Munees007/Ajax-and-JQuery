<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Properties Example</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            background: linear-gradient(to right, #e0f2fe, #f8fafc);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card {
            width: 320px;
            background: white;
            margin: 30px auto;
            padding: 20px;
            border: 3px solid #38bdf8;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #0ea5e9;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: bold;
            color: #0f172a;
            background: #e0f2fe;
        }

        .card p {
            line-height: 1.7;
            color: #475569;
        }

        .card button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .card button:hover {
            background: #0369a1;
        }
    </style>
</head>
<body>
    <h1>CSS Properties Demo</h1>

    <div class="card">
        <div class="avatar">M</div>
        <h2>Meena</h2>
        <p>This page shows different CSS properties like color, border, padding, margin, shadow, radius, hover, and text styles.</p>
        <button>Read More</button>
    </div>
</body>
</html>
