<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Time Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h1 class="h3 mb-0">Class Time Table</h1>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-bordered table-striped text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Day</th>
                            <th>9-10</th>
                            <th>10-11</th>
                            <th>11-12</th>
                            <th>1-2</th>
                            <th>2-3</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>Monday</td><td>HTML</td><td>CSS</td><td>JavaScript</td><td>Bootstrap</td><td>Lab</td></tr>
                        <tr><td>Tuesday</td><td>Java</td><td>DBMS</td><td>Lab</td><td>English</td><td>Maths</td></tr>
                        <tr><td>Wednesday</td><td>CSS</td><td>JavaScript</td><td>HTML</td><td>Seminar</td><td>Lab</td></tr>
                        <tr><td>Thursday</td><td>DBMS</td><td>Java</td><td>Bootstrap</td><td>Maths</td><td>English</td></tr>
                        <tr><td>Friday</td><td>Lab</td><td>Project</td><td>Project</td><td>JavaScript</td><td>Sports</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
